<!DOCTYPE html>
<html>
    <head>
        <title>Blog</title>
    </head>
    <body>
        <h1>Blog</h1>
        <form method = "POST">
            <input type="text" name="title" placeholder="title">
            <br><br>
            <input type="text" name="content" placeholder="content">
            <br><br>
            <button type="submit">Post</button>
        </form>
        <h3>Title: {{title}}</h3>
        <p>Content: {{content}}</p>
    </body>
</html>
