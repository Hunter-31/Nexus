<!DOCTYPE html>
<html>
    <head>
        <title>BMI Calculator</title>
    </head>
    <body>
        <h1>BMI Calculator</h1>
        <form method="POST">
            <input type = "text" name="weight" placeholder="Enter weight in kg">
            <br><br>
            <input type = "text" name="height" placeholder="Enter height in m">
            <br><br>
            <button type="submit">Enter</button>
        </form>
        <h3>Result: {{result}}</h3>
    </body>
</html>
